<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova — Iniciar Sesión</title>
    <meta name="description" content="Panel de administración Nova AI. Inicia sesión para gestionar tu asistente de voz inteligente.">
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #05070f;
            --surface:    rgba(255,255,255,0.04);
            --border:     rgba(255,255,255,0.08);
            --border-focus: rgba(99,179,237,0.6);
            --text-1:     #f0f4ff;
            --text-2:     #8892a4;
            --text-3:     #4a5568;
            --accent:     #4f8ef7;
            --accent-2:   #7c3aed;
            --danger:     #fc8181;
            --success:    #68d391;
            --font:       'Inter', system-ui, sans-serif;
            --ease:       cubic-bezier(0.16,1,0.3,1);
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-1);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* ── CANVAS DE FONDO ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% -10%, rgba(79,142,247,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 110%, rgba(124,58,237,0.15) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 60% 50%, rgba(16,185,129,0.06) 0%, transparent 50%),
                #05070f;
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.55;
            z-index: 0;
        }
        .orb-1 { width: 55vw; height: 55vw; top: -20%; left: -15%; background: radial-gradient(circle, #1e3a8a, transparent 70%); animation: drift 22s var(--ease) infinite alternate; }
        .orb-2 { width: 40vw; height: 40vw; bottom: -20%; right: -10%; background: radial-gradient(circle, #4c1d95, transparent 70%); animation: drift 28s var(--ease) infinite alternate-reverse; }
        .orb-3 { width: 25vw; height: 25vw; top: 40%; left: 55%; background: radial-gradient(circle, #065f46, transparent 70%); animation: drift 18s var(--ease) infinite alternate; }

        @keyframes drift {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(4vw, -6vh) scale(1.12); }
        }

        /* ── LAYOUT ── */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── CARD ── */
        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(10,14,26,0.75);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 40px 40px;
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05) inset,
                0 32px 80px rgba(0,0,0,0.6),
                0 0 60px rgba(79,142,247,0.06);
            animation: rise 0.7s var(--ease) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 36px;
            text-align: center;
        }

        .logo-ring {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(79,142,247,0.2), rgba(124,58,237,0.2));
            border: 1px solid rgba(79,142,247,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 24px rgba(79,142,247,0.2);
        }

        .logo-ring svg { width: 28px; height: 28px; }

        .brand-name {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #e0eaff 0%, #a8c7fa 50%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .brand-sub {
            font-size: 0.82rem;
            color: var(--text-2);
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .divider-line { flex: 1; height: 1px; background: var(--border); }
        .divider-text { font-size: 0.75rem; color: var(--text-3); white-space: nowrap; }

        /* ── FORM ── */
        .form-field {
            margin-bottom: 16px;
        }

        .field-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-2);
            margin-bottom: 7px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-1);
            font-family: var(--font);
            font-size: 0.95rem;
            padding: 13px 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .input-wrap input:focus {
            border-color: var(--border-focus);
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 0 3px rgba(99,179,237,0.12);
        }

        .input-wrap input::placeholder {
            color: var(--text-3);
        }

        .input-wrap.has-icon input {
            padding-right: 46px;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            right: 13px;
            transform: translateY(-50%);
        }

        .btn-eye {
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            color: var(--text-3);
            display: flex;
            align-items: center;
            border-radius: 6px;
            transition: color 0.15s;
        }
        .btn-eye:hover { color: var(--text-2); }
        .btn-eye svg { width: 18px; height: 18px; }

        /* ── ERROR ── */
        .error-box {
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(252,129,129,0.08);
            border: 1px solid rgba(252,129,129,0.2);
            border-radius: 10px;
            padding: 11px 14px;
            margin-bottom: 20px;
            font-size: 0.84rem;
            color: var(--danger);
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        .error-box.visible { display: flex; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px,0,0); }
            20%, 80% { transform: translate3d(2px,0,0); }
            30%, 50%, 70% { transform: translate3d(-3px,0,0); }
            40%, 60% { transform: translate3d(3px,0,0); }
        }

        /* ── SUBMIT ── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: #fff;
            font-family: var(--font);
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(79,142,247,0.3);
            letter-spacing: 0.01em;
        }

        .btn-submit:hover:not(:disabled) {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(79,142,247,0.4);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .btn-submit .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-note {
            margin-top: 24px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-3);
        }

        @media (max-width: 480px) {
            .card { padding: 32px 24px 28px; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="grid-lines"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="page">
        <div class="card">

            <div class="header">
                <div class="logo-ring">
                    <svg viewBox="0 0 28 28" fill="none">
                        <circle cx="14" cy="14" r="12.5" stroke="url(#g1)" stroke-width="1.5"/>
                        <path d="M10 19V9l10 5-10 5z" fill="url(#g1)"/>
                        <defs>
                            <linearGradient id="g1" x1="0" y1="0" x2="28" y2="28">
                                <stop offset="0%" stop-color="#a8c7fa"/>
                                <stop offset="100%" stop-color="#c4b5fd"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div>
                    <div class="brand-name">Nova</div>
                    <div class="brand-sub">Panel de Administración</div>
                </div>
            </div>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">Inicia sesión para continuar</span>
                <div class="divider-line"></div>
            </div>

            <div id="loginError" class="error-box" role="alert">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span id="loginErrorMsg"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
                <div class="form-field">
                    <label class="field-label" for="identifier">Usuario o correo electrónico</label>
                    <div class="input-wrap">
                        <input
                            type="text"
                            id="identifier"
                            name="identifier"
                            autocomplete="username"
                            required
                            placeholder="admin o correo@empresa.com"
                            spellcheck="false"
                            autocapitalize="none"
                        >
                    </div>
                </div>

                <div class="form-field">
                    <label class="field-label" for="password">Contraseña</label>
                    <div class="input-wrap has-icon">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            autocomplete="current-password"
                            required
                            placeholder="••••••••"
                        >
                        <span class="input-icon">
                            <button type="button" class="btn-eye" id="btnTogglePwd" aria-label="Mostrar contraseña">
                                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </span>
                    </div>
                </div>

                <button type="submit" id="btnLogin" class="btn-submit">
                    Iniciar sesión
                </button>
            </form>

            <div class="footer-note">
                Acceso restringido — Solo administradores
            </div>

        </div>
    </div>

    <script>
        const pwdInput  = document.getElementById('password');
        const eyeBtn    = document.getElementById('btnTogglePwd');
        const eyeIcon   = document.getElementById('eyeIcon');

        const EYE_OPEN  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        const EYE_SLASH = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

        eyeBtn.addEventListener('click', () => {
            const show = pwdInput.type === 'password';
            pwdInput.type = show ? 'text' : 'password';
            eyeIcon.innerHTML = show ? EYE_SLASH : EYE_OPEN;
            eyeBtn.setAttribute('aria-label', show ? 'Ocultar contraseña' : 'Mostrar contraseña');
        });

        async function handleLogin(event) {
            event.preventDefault();
            const btn       = document.getElementById('btnLogin');
            const errBox    = document.getElementById('loginError');
            const errMsg    = document.getElementById('loginErrorMsg');
            const identifier = document.getElementById('identifier').value.trim();

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Ingresando…';
            errBox.classList.remove('visible');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: identifier,
                        password: pwdInput.value
                    })
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    btn.innerHTML = '✓ Accediendo…';
                    window.location.reload();
                } else {
                    errMsg.textContent = data.detail || 'Credenciales incorrectas. Intenta de nuevo.';
                    errBox.classList.remove('visible');
                    void errBox.offsetWidth;
                    errBox.classList.add('visible');
                }
            } catch {
                errMsg.textContent = 'Error de red. Verifica tu conexión e intenta de nuevo.';
                errBox.classList.add('visible');
            } finally {
                if (btn.disabled) {
                    btn.disabled = false;
                    btn.innerHTML = 'Iniciar sesión';
                }
            }
        }
    </script>
</body>
</html>
