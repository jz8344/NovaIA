<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova — Asistente Virtual en Tiempo Real</title>
    <meta name="description" content="Asistente Virtual con IA en tiempo real">
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        :root {
            --bg-base:#080b11; --bg-card:#111620; --bg-input:#0d1117; --bg-hover:#161c28;
            --border:rgba(255,255,255,.06); --border-mid:rgba(255,255,255,.10); --border-hi:rgba(255,255,255,.18);
            --accent:#4f8ef7; --accent-2:#7c5ef5; --accent-glow:rgba(79,142,247,.25); --accent-dim:rgba(79,142,247,.12);
            --green:#34d399; --red:#f87171; --amber:#fbbf24; --cyan:#67e8f9;
            --text-1:#e8edf5; --text-2:#8896aa; --text-3:#4e5d71;
            --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif; --font-mono:'JetBrains Mono',monospace;
            --transition:180ms cubic-bezier(.4,0,.2,1);
        }
        body { font-family:var(--font-body); background:var(--bg-base); color:var(--text-1); -webkit-font-smoothing:antialiased; }
        .btn-ghost {
            display:flex; align-items:center; gap:7px;
            padding:7px 14px; border-radius:6px;
            border:1px solid var(--border-mid); background:transparent;
            color:var(--text-2); font-family:var(--font-body); font-size:.82rem;
            cursor:pointer; transition:all var(--transition); text-decoration:none;
        }
        .btn-ghost:hover { border-color:var(--border-hi); color:var(--text-1); background:var(--bg-hover); }
        .logo-badge {
            font-size:.65rem; font-weight:500; letter-spacing:.08em; text-transform:uppercase;
            color:var(--text-3); padding:2px 7px; border-radius:20px;
            border:1px solid var(--border-mid); background:var(--bg-card);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="ambient-bg">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <header class="app-header" style="background:rgba(8,11,17,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);">
            <div class="logo-section">
                <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
                    <circle cx="17" cy="17" r="15.5" stroke="url(#lg-i)" stroke-width="2" fill="none"/>
                    <path d="M12 22V12l10 5-10 5z" fill="url(#lg-i)"/>
                    <defs>
                        <linearGradient id="lg-i" x1="0" y1="0" x2="34" y2="34">
                            <stop offset="0%" stop-color="#4f8ef7"/>
                            <stop offset="100%" stop-color="#7c5ef5"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div class="logo-text">
                    <h1 style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#4f8ef7,#7c5ef5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Nova</h1>
                    <span class="logo-badge">Voice Agent</span>
                </div>
            </div>
            <div class="header-actions">
                <select id="agentSelector" style="
                    background: var(--bg-card);
                    color: var(--text-2);
                    border: 1px solid var(--border-mid);
                    border-radius: 6px;
                    padding: 6px 12px;
                    font-family: var(--font-body);
                    font-size: 0.8rem;
                    outline: none;
                    cursor: pointer;
                    transition: all var(--transition);
                " onmouseover="this.style.borderColor='var(--border-hi)';this.style.color='var(--text-1)';" onmouseout="this.style.borderColor='var(--border-mid)';this.style.color='var(--text-2)';">
                    <option value="nova_default">Configuración Activa</option>
                    <option value="nova_sales">Ventas (Bilingüe)</option>
                    <option value="nova_support">Soporte Técnico</option>
                    <option value="nova_attention">Atención Telefónica</option>
                    <option value="nova_technical">Soporte Avanzado</option>
                    <option value="nova_finance">Finanzas</option>
                </select>
                <div class="status-pill" id="statusPill">
                    <span class="status-dot"></span>
                    <span class="status-text">Desconectado</span>
                </div>
                <a href="/admin" class="btn-ghost" id="btnAdmin">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    Admin
                </a>
            </div>
        </header>

        <main class="main-content">
            <section class="voice-section">
                <div class="voice-visualizer" id="voiceVisualizer">
                    <div class="ring ring-outer"></div>
                    <div class="ring ring-middle"></div>
                    <div class="ring ring-inner"></div>
                    <button class="mic-button" id="micButton" aria-label="Iniciar grabación de voz">
                        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" x2="12" y1="19" y2="22"/>
                        </svg>
                        <svg class="stop-icon hidden" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    </button>
                    <canvas id="waveformCanvas" width="300" height="300"></canvas>
                </div>

                <div class="voice-status">
                    <p class="voice-instruction" id="voiceInstruction">Presiona el micrófono para hablar con Nova</p>
                </div>

                <!-- Indicador de turno -->
                <div id="turnIndicator" style="
                    display:none; align-items:center; gap:10px;
                    padding:10px 20px; border-radius:30px;
                    font-size:.82rem; font-weight:600;
                    border:1px solid; transition:all .3s;
                ">
                    <span id="turnDot" style="width:9px;height:9px;border-radius:50%;display:inline-block"></span>
                    <span id="turnText">—</span>
                </div>

                <div class="waveform-bar" id="waveformBar">
                    <div class="wave-container">
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                    </div>
                </div>
            </section>

            <!-- Tarjeta de prompt activo -->
            <div id="promptInfoCard" style="
                width:100%; max-width:700px;
                background:rgba(13,17,23,.8); backdrop-filter:blur(12px);
                border:1px solid rgba(255,255,255,.07); border-radius:14px;
                padding:16px 20px; font-size:.8rem; color:#8896aa;
                display:none;
            ">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                    <span style="font-family:'Syne',sans-serif;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#4e5d71">Prompt Activo</span>
                    <span id="promptModePill" style="
                        padding:2px 10px; border-radius:20px; font-size:.72rem; font-weight:600;
                        background:rgba(79,142,247,.1); color:#4f8ef7;
                        border:1px solid rgba(79,142,247,.2);
                    ">—</span>
                </div>
                <p id="promptSnippet" style="
                    color:#5a6a7e; font-size:.78rem; line-height:1.55;
                    font-style:italic; margin:0;
                    display:-webkit-box; -webkit-line-clamp:3;
                    -webkit-box-orient:vertical; overflow:hidden;
                ">Cargando información del prompt…</p>
            </div>

            <section class="events-section">
                <div class="events-header">
                    <h2>Actividad en Tiempo Real</h2>
                    <button class="btn-clear" id="btnClearLog">Limpiar</button>
                </div>
                <div class="events-log" id="eventsLog">
                    <div class="event-item event-system">
                        <span class="event-time">--:--:--</span>
                        <span class="event-badge badge-system">SISTEMA</span>
                        <span class="event-text">Asistente Virtual cargado. Listo para conectar.</span>
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <span>Asistente Virtual v1.0</span>
            <span class="separator">·</span>
            <span>Gemini Live API</span>
            <span class="separator">·</span>
            <span id="sessionTimer">00:00</span>
        </footer>
    </div>

    <script src="/static/js/neural-bg.js"></script>
    <script src="/static/js/app.js?v=1.0.2"></script>
</body>
</html>
