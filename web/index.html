<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Virtual — IA en Tiempo Real</title>
    <meta name="description" content="Interfaz de prueba para el Asistente Virtual con IA en tiempo real">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="app-container">
        <div class="ambient-bg">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <header class="app-header">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="url(#logo-grad)" stroke-width="2.5" fill="none"/>
                        <path d="M14 26V14l12 6-12 6z" fill="url(#logo-grad)"/>
                        <defs>
                            <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#818cf8"/>
                                <stop offset="100%" stop-color="#c084fc"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Asistente Virtual</h1>
                    <span class="logo-subtitle">Voice Agent · AI</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="status-pill" id="statusPill">
                    <span class="status-dot"></span>
                    <span class="status-text">Desconectado</span>
                </div>
                <a href="/admin" class="btn-admin" id="btnAdmin">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    Admin
                </a>
            </div>
        </header>

        <main class="main-content">
            <section class="voice-section">
                <div class="voice-visualizer" id="voiceVisualizer">
                    <div class="ring ring-outer"></div>
                    <div class="ring ring-middle"></div>
                    <div class="ring ring-inner"></div>
                    <button class="mic-button" id="micButton" aria-label="Iniciar grabación de voz">
                        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" x2="12" y1="19" y2="22"/>
                        </svg>
                        <svg class="stop-icon hidden" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    </button>
                    <canvas id="waveformCanvas" width="300" height="300"></canvas>
                </div>

                <div class="voice-status">
                    <p class="voice-instruction" id="voiceInstruction">Presiona el micrófono para hablar con el Asistente Virtual</p>
                </div>

                <div class="waveform-bar" id="waveformBar">
                    <div class="wave-container">
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                    </div>
                </div>
            </section>

            <section class="events-section">
                <div class="events-header">
                    <h2>Actividad en Tiempo Real</h2>
                    <button class="btn-clear" id="btnClearLog">Limpiar</button>
                </div>
                <div class="events-log" id="eventsLog">
                    <div class="event-item event-system">
                        <span class="event-time">--:--:--</span>
                        <span class="event-badge badge-system">SISTEMA</span>
                        <span class="event-text">Asistente Virtual cargado. Listo para conectar.</span>
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <span>Asistente Virtual v1.0</span>
            <span class="separator">·</span>
            <span>Gemini Live API</span>
            <span class="separator">·</span>
            <span id="sessionTimer">00:00</span>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
